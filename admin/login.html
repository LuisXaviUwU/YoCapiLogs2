<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - YoCapi App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-page { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-base); }
        .login-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-l); padding:40px; width:100%; max-width:400px; }
        .login-card h1 { font-size:1.5rem; font-weight:700; color:var(--text-hi); margin-bottom:8px; display:flex; align-items:center; gap:10px; }
        .login-card p { color:var(--text-lo); font-size:.9rem; margin-bottom:24px; }
        .login-field { margin-bottom:16px; }
        .login-field label { display:block; font-size:.8rem; font-weight:600; color:var(--text-med); margin-bottom:4px; }
        .login-field input { width:100%; height:40px; padding:0 12px; border-radius:var(--radius-s); border:1px solid var(--border); background:var(--bg-surface); color:var(--text-hi); font-size:.9rem; outline:none; }
        .login-field input:focus { border-color:var(--purple); }
        .login-btn { width:100%; height:42px; border:none; border-radius:var(--radius-s); background:var(--purple); color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
        .login-btn:hover { opacity:.85; }
        .login-error { color:#f87171; font-size:.8rem; margin-top:8px; display:none; }
        .login-link { display:block; text-align:center; margin-top:16px; color:var(--text-lo); font-size:.8rem; }
        .login-link a { color:var(--purple-lt); text-decoration:none; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Admin Panel
            </h1>
            <p>Inicia sesión para acceder al visor de logs por API</p>
            <form id="login-form">
                <div class="login-field">
                    <label>Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" required>
                </div>
                <div class="login-field">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="login-error" id="login-error"></div>
                <button type="submit" class="login-btn" id="login-btn">Iniciar sesión</button>
            </form>
            <span class="login-link">¿No tienes cuenta? <a href="#" id="show-signup">Crear cuenta</a></span>
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // If already logged in, redirect to admin panel
            const session = await checkAuth();
            if (session) {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const showSignup = document.getElementById('show-signup');
            let isSignup = false;

            async function handleAuth() {
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                if (!email || !password) {
                    errorEl.textContent = 'Completa todos los campos';
                    errorEl.style.display = 'block';
                    return;
                }
                btn.disabled = true;
                btn.textContent = isSignup ? 'Creando cuenta...' : 'Iniciando sesión...';
                errorEl.style.display = 'none';

                try {
                    let result;
                    if (isSignup) {
                        result = await signUp(email, password);
                        if (result.error) throw new Error(result.error);
                        errorEl.textContent = 'Cuenta creada. Revisa tu correo para verificar.';
                        errorEl.style.display = 'block';
                        errorEl.style.color = '#4ade80';
                        isSignup = false;
                        showSignup.textContent = '¿No tienes cuenta? Crear cuenta';
                    } else {
                        result = await signIn(email, password);
                        if (result.error) throw new Error(result.error);
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    errorEl.textContent = e.message;
                    errorEl.style.display = 'block';
                    errorEl.style.color = '#f87171';
                } finally {
                    btn.disabled = false;
                    btn.textContent = isSignup ? 'Crear cuenta' : 'Iniciar sesión';
                }
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                handleAuth();
            });

            showSignup.addEventListener('click', (e) => {
                e.preventDefault();
                isSignup = !isSignup;
                btn.textContent = isSignup ? 'Crear cuenta' : 'Iniciar sesión';
                showSignup.textContent = isSignup ? '¿Ya tienes cuenta? Iniciar sesión' : '¿No tienes cuenta? Crear cuenta';
            });
        });
    </script>
</body>
</html>
